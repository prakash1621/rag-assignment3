# RAG Pipeline Configuration

# AWS Bedrock Settings
aws:
  region: "us-east-1"
  embedding_model: "amazon.titan-embed-text-v1"
  llm_model: "anthropic.claude-3-haiku-20240307-v1:0"

# Chunking Strategies
chunking:
  # Parent-Child Chunking
  parent_child:
    parent_size: 3000
    parent_overlap: 500
    child_size: 500
    child_overlap: 100
  
  # Semantic Chunking
  semantic:
    buffer_size: 1
    breakpoint_threshold_type: "percentile"  # percentile, standard_deviation, interquartile
    breakpoint_threshold_amount: 95

# Retrieval Settings
retrieval:
  k: 10
  rerank_top_k: 3

# Semantic Cache (Bonus Feature)
caching:
  semantic:
    enabled: true
    similarity_threshold: 0.95  # cosine similarity threshold
    ttl_seconds: 3600
    max_cache_size: 1000

# Paths
paths:
  knowledge_base: "knowledge-base"
  vector_store: "vector_store"
  cache_dir: "cache"

# Category Keywords
categories:
  Teradata: ["teradata", "data discrepancy", "discrepancies", "td", "sql"]
  pusa-sell-kb: ["pusa", "sell", "seat", "passenger", "res_spcl", "res_dcs", "redshift", "uat"]
  dot: ["dot", "fare", "currency", "calculation"]
  avaya: ["avaya", "qa", "validation", "regression", "testing"]
  swav: ["swav", "vacation", "qmo", "automation"]
  galaxy: ["galaxy", "currency conversion"]
  bppsl: ["bppsl", "reference"]

# Agentic RAG Settings
agentic:
  max_retries: 2  # max self-correction retries for hallucination/quality
  grading:
    doc_relevance_threshold: 0.5  # min docs that must be relevant to proceed
  routing:
    default: "vectorstore"  # fallback route if router fails
